<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Station - trainbelgium.com</title>

    <link rel="stylesheet" href="../css/style.css" />
    <script
      src="https://kit.fontawesome.com/9332905c2e.js"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      href="../images/favicon-32x32.png"
      sizes="32x32"
    />
    <link
      rel="icon"
      type="image/png"
      href="../images//favicon-16x16.png"
      sizes="16x16"
    />
    <link rel="apple-touch-icon" href="../images//apple-touch-icon.png" />

    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="../images//icon-512.png"
    />
  </head>

  <body>
    <div id="navbar"></div>

    <main>
      <div class="container page-title station-header">
        <h1 id="stationTitle">Station</h1>
        <p id="stationSubtitle">Loading station gallery...</p>
        <a class="btn btn-primary station-back" href="Photos.html">Back to photos</a>
      </div>

      <section class="container section" style="padding-top: 18px">
        <div class="photo-grid" id="stationGrid"></div>

        <p class="no-results" id="stationNotFound" style="display: none">
          Station not found. Please go back to the photo page and choose a location.
        </p>
      </section>
    </main>

    <div id="footer"></div>

    <script src="../js/loadComponents.js"></script>
    <script src="../js/stationsData.js"></script>
    <script src="../js/script.js"></script>
  </body>
</html>
